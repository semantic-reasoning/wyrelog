# SPDX-License-Identifier: GPL-3.0-or-later
name: CI PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-posix:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      # Relativise absolute paths baked into debug info so cache entries stay
      # valid across runs even though the workspace path is fixed on hosted
      # runners; matches the Windows job.
      SCCACHE_BASEDIRS: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tpm: enabled
          - os: macos-latest
            tpm: disabled
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libglib2.0-dev libsqlite3-dev libsoup-3.0-dev libsodium-dev \
            libtss2-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          brew update
          brew install meson ninja pkg-config glib sqlite libsoup libsodium

      - name: Restore meson packagecache
        uses: actions/cache/restore@v5
        with:
          path: subprojects/packagecache
          key: ${{ runner.os }}-packagecache-${{ hashFiles('subprojects/*.wrap') }}
          restore-keys: |
            ${{ runner.os }}-packagecache-

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Select compiler cache
        shell: bash
        run: |
          if [ "${{ steps.sccache.outcome }}" = success ] \
            && command -v sccache >/dev/null 2>&1 \
            && sccache --version >/dev/null 2>&1; then
            echo 'CC=sccache cc' >> "$GITHUB_ENV"
            echo 'CXX=sccache c++' >> "$GITHUB_ENV"
          else
            echo 'CC=cc' >> "$GITHUB_ENV"
            echo 'CXX=c++' >> "$GITHUB_ENV"
            echo 'sccache unavailable; using native compiler'
          fi

      - name: Configure
        run: |
          meson setup builddir \
            -Denable_tpm=${{ matrix.tpm }} \
            -Denable_audit=enabled \
            -Dduckdb_source=prebuilt

      - name: Build and test
        run: meson test -C builddir --print-errorlogs --suite wyrelog

      - name: Build fact-store production daemon
        if: runner.os == 'Linux'
        run: |
          meson setup build-fact -Denable_fact_store=enabled \
            -Denable_audit=enabled -Dduckdb_source=prebuilt
          meson compile -C build-fact wyrelogd

      - name: Show sccache statistics
        if: always()
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || echo 'sccache statistics unavailable'
          else
            echo 'sccache unavailable; no statistics to show'
          fi

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: meson-logs-${{ matrix.os }}
          path: builddir/meson-logs/
          if-no-files-found: ignore

  build-windows:
    name: build-windows${{ matrix.job_suffix }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fact_store: disabled
            job_suffix: ''
          - fact_store: enabled
            job_suffix: -fact
    env:
      SCCACHE_GHA_ENABLED: "true"
      # Stays the checkout even though vcpkg no longer lives there: this only
      # relativises paths so hashes survive a moved tree, and both locations
      # are fixed on hosted runners, so the hit rate does not depend on it.
      SCCACHE_BASEDIRS: ${{ github.workspace }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      # A dependency tree inside the checkout is indistinguishable from project
      # source to anything that walks the tree, which is how the POSIX runners
      # already see their system prefixes. The runner context is unavailable in
      # job-level env, so resolve the paths from RUNNER_TEMP here instead.
      - name: Point vcpkg outside the checkout
        shell: bash
        run: |
          vcpkg="${RUNNER_TEMP}\\vcpkg"
          binary_cache="${RUNNER_TEMP}\\vcpkg-binary-cache"
          {
            printf '%s\n' "VCPKG_ROOT=${vcpkg}"
            printf '%s\n' "VCPKG_INSTALLED_DIR=${vcpkg}\\installed\\x64-windows"
            printf '%s\n' "VCPKG_DEFAULT_BINARY_CACHE=${binary_cache}"
            printf '%s\n' "VCPKG_BINARY_SOURCES=clear;files,${binary_cache},readwrite"
          } >> "$GITHUB_ENV"

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Select Windows compiler cache
        shell: bash
        run: |
          sccache_path="${SCCACHE_PATH:-$(command -v sccache || true)}"
          sccache_exe="$(cygpath -w "$sccache_path" 2>/dev/null || true)"
          case "$sccache_exe" in *.exe|*.EXE) ;; *) sccache_exe="" ;; esac
          if [ "${{ steps.sccache.outcome }}" = success \
            ] && [ -n "$sccache_exe" ] \
            && [ -x "$sccache_path" ] \
            && "$sccache_path" --version >/dev/null 2>&1; then
            echo 'WYRELOG_USE_SCCACHE=1' >> "$GITHUB_ENV"
            echo "SCCACHE_EXE=$sccache_exe" >> "$GITHUB_ENV"
            dirname "$sccache_path" >> "$GITHUB_PATH"
          else
            echo 'WYRELOG_USE_SCCACHE=0' >> "$GITHUB_ENV"
            echo 'sccache unavailable; using native clang-cl'
          fi

      - name: Remove system vcpkg
        shell: bash
        run: rm -rf "$VCPKG_INSTALLATION_ROOT"

      - name: Bootstrap vendored vcpkg
        shell: cmd
        run: |
          @echo off
          git clone --depth 1 --branch 2026.04.27 https://github.com/microsoft/vcpkg.git "%VCPKG_ROOT%"
          call "%VCPKG_ROOT%\bootstrap-vcpkg.bat" -disableMetrics

      - name: Restore vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          # v5, with no fallbacks: actions/cache stores archive members
          # relative to GITHUB_WORKSPACE and extracts them back under it, so
          # an entry saved while vcpkg lived in the checkout restores into the
          # checkout again whatever `path` says. Every older key does that.
          key: vcpkg-windows-v5-2026.04.27-x64-windows-glib-sqlite3-libsodium-libsoup

      - name: Restore vcpkg installed tree
        id: vcpkg-installed-cache
        continue-on-error: true
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_ROOT }}\installed
          # v3, with no fallbacks: same workspace-rooted archive contract as
          # the binary packages above.
          key: vcpkg-windows-installed-v3-2026.04.27-x64-windows-glib-sqlite3-libsodium-libsoup

      - name: Clear failed vcpkg installed restore
        if: steps.vcpkg-installed-cache.outcome == 'failure'
        shell: bash
        run: rm -rf "$VCPKG_ROOT/installed"

      - name: Create vcpkg binary cache
        shell: cmd
        run: if not exist "%VCPKG_DEFAULT_BINARY_CACHE%" mkdir "%VCPKG_DEFAULT_BINARY_CACHE%"

      - name: Install meson and ninja
        shell: cmd
        run: pip install meson ninja

      - name: Install C dependencies (vcpkg)
        shell: cmd
        run: |
          @echo off
          "%VCPKG_ROOT%\vcpkg.exe" install pkgconf:x64-windows glib:x64-windows sqlite3:x64-windows libsodium:x64-windows libsoup:x64-windows --x-abi-tools-use-exact-versions

      # Installing outside the checkout is only worth anything if nothing under
      # it can still be mistaken for project source, and a cache entry rooted at
      # an older layout would restore one back without failing anything. Assert
      # the property the layout exists for rather than trusting it holds.
      - name: Assert no dependency tree in the checkout
        shell: bash
        run: |
          status=0
          for tree in vcpkg vcpkg_installed vcpkg-binary-cache; do
            if [ -e "${GITHUB_WORKSPACE}/${tree}" ]; then
              echo "::error::${tree} resolved under the workspace"
              status=1
            fi
          done
          exit "$status"

      - name: Save vcpkg binary packages
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save vcpkg installed tree
        if: steps.vcpkg-installed-cache.outcome == 'success' && steps.vcpkg-installed-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_ROOT }}\installed
          key: ${{ steps.vcpkg-installed-cache.outputs.cache-primary-key }}

      - name: Restore meson packagecache
        id: meson-packagecache
        uses: actions/cache/restore@v5
        with:
          path: subprojects/packagecache
          key: windows-packagecache-${{ hashFiles('subprojects/*.wrap') }}
          restore-keys: |
            windows-packagecache-

      - name: Configure (clang-cl)
        shell: cmd
        run: |
          @echo off
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PKG_CONFIG=%VCPKG_INSTALLED_DIR%\tools\pkgconf\pkgconf.exe
          set PKG_CONFIG_PATH=%VCPKG_INSTALLED_DIR%\lib\pkgconfig;%VCPKG_INSTALLED_DIR%\share\pkgconfig
          set PATH=%VCPKG_INSTALLED_DIR%\tools\pkgconf;%VCPKG_INSTALLED_DIR%\bin;%PATH%
          set "SCCACHE_LAUNCHER=%SCCACHE_EXE%"
          if exist builddir rmdir /s /q builddir
          if "%WYRELOG_USE_SCCACHE%"=="1" (
            if not exist "%SCCACHE_LAUNCHER%" set /a SCCACHE_PROBE_FAILED=1
            if not defined SCCACHE_PROBE_FAILED "%SCCACHE_LAUNCHER%" clang-cl --version >NUL 2>&1
            if errorlevel 1 set /a SCCACHE_PROBE_FAILED=1
            if defined SCCACHE_PROBE_FAILED (
              set WYRELOG_USE_SCCACHE=0
              echo WYRELOG_USE_SCCACHE=0>>"%GITHUB_ENV%"
            )
          )
          if "%WYRELOG_USE_SCCACHE%"=="1" (
            set "CC=%SCCACHE_LAUNCHER% clang-cl"
            set "CXX=%SCCACHE_LAUNCHER% clang-cl"
            echo Windows compiler mode: sccache clang-cl
          ) else (
            set "CC=clang-cl"
            set "CXX=clang-cl"
            echo Windows compiler mode: native clang-cl
          )
          meson setup builddir -Denable_tpm=disabled -Denable_client=enabled -Ddefault_library=static -Denable_audit=enabled -Denable_fact_store=${{ matrix.fact_store }} -Dduckdb_source=prebuilt
          if "%WYRELOG_USE_SCCACHE%"=="1" (
            ninja -C builddir -t commands | findstr /I /C:"sccache" >NUL
            if errorlevel 1 exit /b 1
          )

      - name: Save meson packagecache
        if: steps.meson-packagecache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: subprojects/packagecache
          key: ${{ steps.meson-packagecache.outputs.cache-primary-key }}

      - name: Build and test (clang-cl)
        shell: cmd
        run: |
          @echo off
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PKG_CONFIG=%VCPKG_INSTALLED_DIR%\tools\pkgconf\pkgconf.exe
          set PATH=%GITHUB_WORKSPACE%\subprojects\duckdb-prebuilt-windows-amd64;%VCPKG_INSTALLED_DIR%\tools\pkgconf;%VCPKG_INSTALLED_DIR%\bin;%PATH%
          meson compile -C builddir wyctl wyrelogd
          if not exist builddir\wyrelog\wyctl.exe exit /b 1
          builddir\wyrelog\wyctl.exe --help >NUL
          builddir\wyrelog\wyrelogd.exe --help | findstr /C:"--listen-port"
          meson test -C builddir --print-errorlogs --suite wyrelog

      - name: Show sccache statistics
        if: always()
        shell: bash
        run: |
          sccache_path="$(cygpath -u "${SCCACHE_EXE:-}" 2>/dev/null || true)"
          if [ -n "$sccache_path" ] && [ -x "$sccache_path" ]; then
            stats="$("$sccache_path" --show-stats 2>&1)" || {
              echo "$stats"
              test "$WYRELOG_USE_SCCACHE" != 1
            }
            echo "$stats"
            if [ "$WYRELOG_USE_SCCACHE" = 1 ]; then
              echo "$stats" | grep -Eq 'Compile requests[[:space:]]+[1-9][0-9]*'
            fi
          else
            test "$WYRELOG_USE_SCCACHE" != 1
            echo 'sccache unavailable; no statistics to show'
          fi

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: meson-logs-windows${{ matrix.job_suffix }}
          path: builddir/meson-logs/
          if-no-files-found: ignore
