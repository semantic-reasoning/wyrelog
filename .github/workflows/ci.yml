# SPDX-License-Identifier: GPL-3.0-or-later
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-posix:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tpm: enabled
          - os: macos-latest
            tpm: disabled
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libglib2.0-dev libsoup-3.0-dev libsodium-dev \
            libtss2-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja pkg-config glib libsoup libsodium

      - name: Cache meson packagecache
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: ${{ runner.os }}-packagecache-${{ hashFiles('subprojects/*.wrap') }}
          restore-keys: |
            ${{ runner.os }}-packagecache-

      - name: Configure
        run: meson setup builddir -Denable_tpm=${{ matrix.tpm }}

      - name: Build and test
        run: meson test -C builddir --print-errorlogs --suite wyrelog

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs-${{ matrix.os }}
          path: builddir/meson-logs/
          if-no-files-found: ignore

  build-windows:
    name: build-windows
    runs-on: windows-latest
    env:
      VCPKG_INSTALLED_DIR: C:\vcpkg\installed\x64-windows
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install meson and ninja
        shell: cmd
        run: pip install meson ninja

      - name: Install pkg-config (chocolatey)
        shell: cmd
        run: choco install pkgconfiglite -y --allow-empty-checksums

      - name: Prepare vcpkg binary cache directory
        shell: cmd
        run: |
          @echo off
          set "CACHE_DIR=%RUNNER_TEMP%\vcpkg-cache"
          if not exist "%CACHE_DIR%" mkdir "%CACHE_DIR%"
          echo VCPKG_DEFAULT_BINARY_CACHE=%CACHE_DIR%>> %GITHUB_ENV%

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg-cache
          key: windows-vcpkg-${{ hashFiles('.github/workflows/ci.yml') }}-v1
          restore-keys: |
            windows-vcpkg-

      - name: Install C dependencies (vcpkg)
        shell: cmd
        run: |
          @echo off
          vcpkg install glib:x64-windows libsodium:x64-windows

      - name: Cache meson packagecache
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: windows-packagecache-${{ hashFiles('subprojects/*.wrap') }}
          restore-keys: |
            windows-packagecache-

      - name: Configure (clang-cl)
        shell: cmd
        run: |
          @echo off
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PKG_CONFIG_PATH=%VCPKG_INSTALLED_DIR%\lib\pkgconfig
          set CC=clang-cl
          meson setup builddir -Denable_tpm=disabled -Denable_client=disabled -Ddefault_library=static

      - name: Build and test (clang-cl)
        shell: cmd
        run: |
          @echo off
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson test -C builddir --print-errorlogs --suite wyrelog

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs-windows
          path: builddir/meson-logs/
          if-no-files-found: ignore
